name: Docker Build and Push

on:
  workflow_call:
    inputs:
      IS_DEV:
        type: boolean
        required: true
      IS_PROD:
        type: boolean
        required: true

    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true

jobs:
  docker:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAMESPACE: ${{ secrets.DOCKER_USERNAME }}
      IMAGE_NAME: konsulin-app

    steps:
      - name: Checkout Source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get Short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Get Timestamp
        run: echo "TIMESTAMP=$(date +'%Y%m%d-%H%M')" >> $GITHUB_ENV

      - name: Build and Push Docker Images
        run: |
          if [ "${{ inputs.IS_DEV }}" == "true" ]; then
            echo "Development build..."
            VERSION="dev-${{ env.SHORT_SHA }}"
            docker build \
              -t ${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_NAME }}:nightly \
              -t ${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_NAME }}:${VERSION} \
              -f Dockerfile .

            docker push ${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_NAME }}:nightly
            docker push ${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_NAME }}:${VERSION}

          elif [ "${{ inputs.IS_PROD }}" == "true" ]; then
            echo "Production build..."
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "latest")
            docker build \
              -t ${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest \
              -t ${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_NAME }}:${VERSION} \
              -f Dockerfile .

            docker push ${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest
            docker push ${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_NAME }}:${VERSION}
          else
            echo "No valid environment specified. Needs IS_DEV or IS_PROD true."
            exit 1
          fi
