version: "2"

linters:
  default: none
  enable:
    - errcheck
    - gocyclo
    - ineffassign
    - staticcheck
    - unused

  settings:
    gocyclo:
      min-complexity: 15
    errcheck:
      check-type-assertions: true
    staticcheck:
      checks:
        - all

  exclusions:
    paths:
      - node_modules
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gocyclo
